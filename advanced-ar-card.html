<!DOCTYPE html>
<html>
<head>
  <title>Spice AR Marketing</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin:0; overflow:hidden; }

    #ui {
      position: fixed;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .btn {
      background: #ff5722;
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- Buttons -->
<div id="ui">
  <button class="btn" onclick="window.open('https://yourwebsite.com')">🌐 Visit</button>
  <button class="btn" onclick="window.location.href='tel:+91XXXXXXXXXX'">📞 Call</button>
</div>

<a-scene embedded arjs>

  <a-marker preset="hiro">

    <!-- 🌶 Product Image -->
    <a-image 
      src="https://upload.wikimedia.org/wikipedia/commons/3/36/Red_chili_powder.jpg"
      position="0 0.5 0"
      width="1.5"
      height="1">
    </a-image>

    <!-- 🔥 Title -->
    <a-text 
      value="Flavarich Spices"
      position="-1 1.2 0"
      color="yellow"
      scale="1.5 1.5 1.5">
    </a-text>

    <!-- ✨ Tagline -->
    <a-text 
      value="True Taste of Authentic Spices"
      position="-1 0.9 0"
      color="cyan">
    </a-text>

    <!-- 📦 Features -->
    <a-text 
      value="✔ Rich Aroma\n✔ Quality Tested\n✔ Hygienic Packaging"
      position="-1 0.6 0"
      color="white"
      scale="0.8 0.8 0.8">
    </a-text>

    <!-- 🟢 Rotating Product Box -->
    <a-box position="1 0.5 0"
           color="green"
           depth="0.5"
           height="0.5"
           width="0.5">
      <a-animation attribute="rotation"
                   to="0 360 0"
                   dur="3000"
                   repeat="indefinite">
      </a-animation>
    </a-box>

    <!-- 🔵 Data Flow Animation -->
    <a-sphere position="-0.5 0.3 0"
              radius="0.1"
              color="blue">
      <a-animation attribute="position"
                   from="-0.5 0.3 0"
                   to="0.5 0.3 0"
                   dur="1500"
                   direction="alternate"
                   repeat="indefinite">
      </a-animation>
    </a-sphere>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
