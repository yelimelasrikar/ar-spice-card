<!DOCTYPE html>
<html>
<head>
  <title>Flavarich Spice AR</title>
  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>

<body>

<a-scene 
  embedded 
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  vr-mode-ui="enabled: false"
  renderer="antialias: true; colorManagement: true;">

  <!-- Preloading Assets for better performance -->
  <a-assets>
    <img id="chili-powder" src="https://upload.wikimedia.org/wikipedia/commons/3/36/Red_chili_powder.jpg">
    <img id="turmeric" src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Turmeric_powder.jpg">
    <img id="chili-whole" src="https://upload.wikimedia.org/wikipedia/commons/4/45/Chili_powder.jpg">
  </a-assets>

  <!-- HIRO MARKER -->
  <a-marker preset="hiro">
    
    <!-- 1. MAIN TITLE (Top) -->
    <a-entity position="0 1 -1.2" rotation="-90 0 0">
        <a-text 
          value="FLAVARICH SPICES" 
          align="center" 
          color="#FFD700" 
          width="4"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
        </a-text>
    </a-entity>

    <!-- 2. TAGLINE (Below Title) -->
    <a-text 
      value="Authentic Spice Experience" 
      position="0 0.8 -0.8" 
      rotation="-90 0 0"
      align="center" 
      color="#00FFFF" 
      scale="0.6 0.6 0.6">
    </a-text>

    <!-- 3. CENTER HERO IMAGE -->
    <a-image 
      src="#chili-powder"
      position="0 0.5 0"
      rotation="-90 0 0"
      width="1.2"
      height="0.9">
    </a-image>

    <!-- 4. LEFT SIDE IMAGE -->
    <a-image 
      src="#turmeric"
      position="-1.2 0.3 0"
      rotation="-90 0 0"
      width="0.7"
      height="0.6">
    </a-image>

    <!-- 5. RIGHT SIDE IMAGE -->
    <a-image 
      src="#chili-whole"
      position="1.2 0.3 0"
      rotation="-90 0 0"
      width="0.7"
      height="0.6">
    </a-image>

    <!-- 6. FEATURES LIST (Bottom) -->
    <a-entity position="0 0.2 0.8" rotation="-90 0 0">
        <!-- Background panel for text readability -->
        <a-plane color="#000" opacity="0.5" width="2" height="0.6" position="0 0 -0.01"></a-plane>
        <a-text 
          value="Rich Aroma | Quality Tested | Hygienic" 
          align="center" 
          color="white" 
          scale="0.5 0.5 0.5">
        </a-text>
    </a-entity>

    <!-- 7. ROTATING DECORATION (The Box) -->
    <a-box 
      position="0 0.2 1.3"
      scale="0.3 0.3 0.3"
      color="#4CAF50"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
    </a-box>

  </a-marker>

  <!-- CAMERA -->
  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
