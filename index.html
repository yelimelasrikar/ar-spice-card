<!DOCTYPE html>
<html>
<head>
  <title>Flavarich Spice AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    
    <a-assets>
      <!-- ✅ Correct file names -->
      <img id="img1" src="chili.png">
      <img id="img2" src="turmeric.png">
      <img id="img3" src="spices.png">
    </a-assets>

    <a-marker preset="hiro">
      <a-entity rotation="-60 0 0" position="0 0 0">
        
        <!-- TITLE -->
        <a-text 
          value="FLAVARICH SPICES" 
          align="center" 
          position="0 1.2 0" 
          color="#FFD700" 
          width="4">
        </a-text>

        <!-- IMAGES -->
        <a-image src="#img1" position="0 0.5 0.1" width="1.2" height="0.8"></a-image>
        <a-image src="#img2" position="-1.1 0.4 0" width="0.7" height="0.5"></a-image>
        <a-image src="#img3" position="1.1 0.4 0" width="0.7" height="0.5"></a-image>

        <!-- TEXT BAR -->
        <a-plane color="#000" opacity="0.6" position="0 -0.2 0.1" width="2.4" height="0.3"></a-plane>
        <a-text 
          value="Rich Aroma | Quality Tested | Hygienic" 
          align="center" 
          position="0 -0.2 0.11" 
          color="white" 
          width="2.5">
        </a-text>

      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
