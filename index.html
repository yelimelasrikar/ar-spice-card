<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavarich AR Experience</title>

    <!-- Libraries -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    
    <!-- React & Babel for JSX -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <script>
        // Tailwind Configuration
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#f9f7f2',
                        terracotta: '#cc5a3a',
                        olive: '#5a5a40',
                        slate: '#2c2c2c',
                        sand: '#e8e2d6',
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }

        // Register A-Frame Component
        AFRAME.registerComponent('buy-button', {
            init: function () {
                this.el.addEventListener('click', () => {
                    window.open("https://your-link.com", "_blank");
                });
            }
        });
    </script>

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background-color: transparent; }
        /* Ensure the video feed is visible behind the UI */
        #arjs-video { 
            object-fit: cover !important; 
            width: 100% !important; 
            height: 100% !important; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: -1; 
        }
        .a-canvas { border-radius: 40px !important; }
        .a-enter-vr, .a-enter-ar { display: none !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [arStarted, setArStarted] = useState(false);

            const startExperience = () => {
                setArStarted(true);
            };

            return (
                <div className={`min-h-screen flex flex-col font-sans text-slate overflow-hidden ${!arStarted ? 'bg-cream' : 'bg-transparent'}`}>
                    {/* Header */}
                    <header className="flex justify-between items-center px-8 md:px-12 py-6 border-b border-black/5 bg-cream/80 backdrop-blur-md z-50">
                        <div className="font-serif text-2xl font-bold tracking-wider text-terracotta uppercase">
                            Flavarich
                        </div>
                        <nav className="hidden md:flex gap-8 text-[11px] uppercase tracking-[0.2em] font-semibold text-slate/60">
                            <span className="hover:text-terracotta cursor-pointer transition-colors">Collection</span>
                            <span className="text-terracotta">AR View</span>
                            <span className="hover:text-terracotta cursor-pointer transition-colors">Sourcing</span>
                            <span className="hover:text-terracotta cursor-pointer transition-colors">Contact</span>
                        </nav>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 grid grid-cols-1 lg:grid-cols-[1fr_1.2fr] gap-10 px-8 md:px-12 py-8 items-center max-w-7xl mx-auto w-full">
                        {/* Product Info */}
                        <div className="max-w-md space-y-6 z-20">
                            <div className="space-y-2">
                                <span className="font-serif italic text-olive text-sm block">Premium Indian Spices</span>
                                <h1 className="font-serif text-5xl md:text-6xl leading-[1.1] text-slate">
                                    Premium Red Chili Powder
                                </h1>
                            </div>
                            
                            <div className="text-3xl font-light text-terracotta">
                                ₹199.00
                            </div>
                            
                            <p className="text-slate/70 leading-relaxed text-sm md:text-base">
                                Sun-dried, stone-ground Guntur chilies preserved to retain their natural oils and intense smoky heat. 
                                Experience the authentic taste of tradition in every pinch.
                            </p>

                            <div className="flex flex-wrap gap-4 pt-4">
                                <button 
                                    onClick={() => window.open("https://your-link.com", "_blank")}
                                    className="px-8 py-4 rounded-full bg-terracotta text-white text-[11px] font-bold uppercase tracking-widest hover:bg-terracotta/90 transition-all shadow-lg shadow-terracotta/20"
                                >
                                    Buy Now
                                </button>
                                {!arStarted && (
                                    <button 
                                        onClick={startExperience}
                                        className="px-8 py-4 rounded-full bg-slate text-white text-[11px] font-bold uppercase tracking-widest hover:bg-slate/90 transition-all shadow-lg"
                                    >
                                        Start AR View
                                    </button>
                                )}
                            </div>

                            {/* Marker Instructions */}
                            <div className="mt-8 p-4 bg-sand/50 rounded-2xl border border-black/5 backdrop-blur-sm">
                                <h3 className="text-xs font-bold uppercase tracking-wider text-terracotta mb-2">How to view in AR</h3>
                                <p className="text-xs text-slate/60 mb-3">
                                    Point your camera at a <span className="font-bold text-slate">Hiro Marker</span> to see the product in 3D.
                                </p>
                                <a 
                                    href="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" 
                                    target="_blank" 
                                    rel="noreferrer"
                                    className="text-[10px] uppercase tracking-widest font-bold text-terracotta underline"
                                >
                                    Download Marker
                                </a>
                            </div>
                        </div>

                        {/* AR Visualizer Container */}
                        <div className="relative bg-sand/30 rounded-[40px] h-[500px] md:h-[600px] overflow-hidden shadow-inner flex items-center justify-center group border-4 border-white/50">
                            {/* Decorative Frame */}
                            <div className="absolute inset-5 border-2 border-white/30 rounded-[30px] pointer-events-none z-10"></div>
                            
                            {!arStarted ? (
                                <div className="text-center p-8 z-20">
                                    <div className="w-20 h-20 bg-terracotta/10 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <svg className="w-10 h-10 text-terracotta" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                                        </svg>
                                    </div>
                                    <h2 className="font-serif text-2xl mb-2">AR Visualizer</h2>
                                    <p className="text-sm text-slate/60 mb-6">Click the button below to enable your camera and start the experience.</p>
                                    <button 
                                        onClick={startExperience}
                                        className="px-10 py-4 rounded-full bg-terracotta text-white text-[12px] font-bold uppercase tracking-widest hover:scale-105 transition-transform"
                                    >
                                        Enable Camera
                                    </button>
                                </div>
                            ) : (
                                <div className="absolute inset-0">
                                    <a-scene 
                                        embedded 
                                        arjs="sourceType: webcam; debugUIEnabled: false;" 
                                        vr-mode-ui="enabled: false"
                                        renderer="logarithmicDepthBuffer: true; antialias: true;"
                                    >
                                        <a-assets>
                                            <img id="chiliImg" src="https://picsum.photos/seed/chili/400/300" crossOrigin="anonymous" />
                                            <img id="turmericImg" src="https://picsum.photos/seed/turmeric/400/300" crossOrigin="anonymous" />
                                            <img id="spicesImg" src="https://picsum.photos/seed/spices/600/400" crossOrigin="anonymous" />
                                            <a-asset-item id="model" src="hot.glb"></a-asset-item>
                                        </a-assets>

                                        <a-marker preset="hiro">
                                            <a-entity>
                                                <a-entity 
                                                    gltf-model="#model"
                                                    position="0 0.2 0"
                                                    scale="0.3 0.3 0.3"
                                                    animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"
                                                ></a-entity>

                                                <a-text 
                                                    value="FLAVARICH SPICES"
                                                    position="0 1.2 0"
                                                    align="center"
                                                    color="#cc5a3a"
                                                    width="4"
                                                    font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
                                                    look-at="[camera]"
                                                ></a-text>

                                                <a-text 
                                                    value="₹199"
                                                    position="0 1.6 0"
                                                    align="center"
                                                    color="#2c2c2c"
                                                    width="3"
                                                    look-at="[camera]"
                                                ></a-text>

                                                <a-image 
                                                    src="#chiliImg" 
                                                    position="-1 0.6 0" 
                                                    width="0.8" 
                                                    height="0.6"
                                                    look-at="[camera]"
                                                ></a-image>
                                                
                                                <a-image 
                                                    src="#turmericImg" 
                                                    position="1 0.6 0" 
                                                    width="0.8" 
                                                    height="0.6"
                                                    look-at="[camera]"
                                                ></a-image>

                                                <a-image 
                                                    src="#spicesImg" 
                                                    position="0 0.1 0.5" 
                                                    width="1.2" 
                                                    height="0.7"
                                                    rotation="-90 0 0"
                                                ></a-image>

                                                <a-entity position="0 -0.5 0" look-at="[camera]">
                                                    <a-plane 
                                                        id="buyBtn"
                                                        width="1.5"
                                                        height="0.5"
                                                        color="#cc5a3a"
                                                        class="clickable"
                                                        buy-button
                                                    >
                                                        <a-text 
                                                            value="BUY NOW"
                                                            align="center"
                                                            color="white"
                                                            width="3"
                                                            position="0 0 0.05"
                                                        ></a-text>
                                                    </a-plane>
                                                </a-entity>
                                            </a-entity>
                                        </a-marker>

                                        <a-entity camera>
                                            <a-cursor
                                                id="cursor"
                                                animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
                                                raycaster="objects: .clickable"
                                                color="#cc5a3a"
                                            ></a-cursor>
                                        </a-entity>
                                    </a-scene>
                                </div>
                            )}

                            {/* Camera Active Indicator */}
                            {arStarted && (
                                <div className="absolute bottom-6 left-1/2 -translate-x-1/2 z-20">
                                    <div className="bg-white/90 backdrop-blur-sm px-6 py-2 rounded-full shadow-xl text-[10px] font-bold uppercase tracking-widest text-terracotta border border-terracotta/20 flex items-center gap-2">
                                        <span className="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                                        Live Camera • Point at Hiro Marker
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="px-8 md:px-12 py-6 text-[10px] uppercase tracking-widest text-slate/40 flex justify-between items-center border-t border-black/5 bg-cream/80 z-50">
                        <span>© 2024 Flavarich Spices</span>
                        <div className="flex gap-6">
                            <span>Privacy</span>
                            <span>Terms</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
