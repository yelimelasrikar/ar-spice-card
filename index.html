<!DOCTYPE html>
<html>
<head>
  <title>Spice AR Marketing</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin:0; overflow:hidden; }
  </style>
</head>

<body>

<a-scene 
  embedded 
  arjs="sourceType: webcam; debugUIEnabled: false;"
  vr-mode-ui="enabled: false">

  <!-- MARKER -->
  <a-marker preset="hiro">

    <!-- 🌶 CENTER IMAGE -->
    <a-image 
      src="https://upload.wikimedia.org/wikipedia/commons/3/36/Red_chili_powder.jpg"
      position="0 0.6 0"
      width="1"
      height="0.7">
    </a-image>

    <!-- TITLE -->
    <a-text 
      value="Flavarich Spices"
      position="0 1.4 0"
      align="center"
      color="yellow"
      scale="1.2 1.2 1.2">
    </a-text>

    <!-- TAGLINE -->
    <a-text 
      value="Authentic Spice Experience"
      position="0 1.1 0"
      align="center"
      color="cyan">
    </a-text>

    <!-- FEATURES -->
    <a-text 
      value="Rich Aroma\nQuality Tested\nHygienic Packaging"
      position="0 0.8 0"
      align="center"
      color="white"
      scale="0.7 0.7 0.7">
    </a-text>

    <!-- LEFT IMAGE -->
    <a-image 
      src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Turmeric_powder.jpg"
      position="-1 0.4 0"
      width="0.6"
      height="0.5">
    </a-image>

    <!-- RIGHT IMAGE -->
    <a-image 
      src="https://upload.wikimedia.org/wikipedia/commons/4/45/Chili_powder.jpg"
      position="1 0.4 0"
      width="0.6"
      height="0.5">
    </a-image>

    <!-- ROTATING BOX -->
    <a-box position="0 -0.2 0"
           color="#4CAF50"
           depth="0.4"
           height="0.4"
           width="0.4">
      <a-animation attribute="rotation"
                   to="0 360 0"
                   dur="3000"
                   repeat="indefinite">
      </a-animation>
    </a-box>

  </a-marker>

  <!-- CAMERA -->
  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
