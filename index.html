<!DOCTYPE html>
<html>
<head>
  <title>Flavarich AR Shop</title>

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <!-- Gesture for touch -->
  <script src="https://unpkg.com/aframe-gesture-detector/dist/aframe-gesture-detector.min.js"></script>
  <script src="https://unpkg.com/aframe-super-hands-component/dist/aframe-super-hands-component.min.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

<a-scene embedded arjs="sourceType: webcam;" vr-mode-ui="enabled: false">

  <!-- ASSETS -->
  <a-assets>
    <a-asset-item id="model" src="model.glb"></a-asset-item>
  </a-assets>

  <!-- MARKER -->
  <a-marker preset="hiro">

    <a-entity id="product" position="0 0.5 0" rotation="-60 0 0">

      <!-- 🔥 3D PRODUCT -->
      <a-entity 
        id="model3D"
        gltf-model="#model"
        scale="0.5 0.5 0.5"
        class="clickable"
        gesture-handler>
      </a-entity>

      <!-- 💰 PRICE TEXT (HIDDEN INITIALLY) -->
      <a-text 
        id="priceText"
        value="₹199"
        position="0 1.2 0"
        align="center"
        color="yellow"
        visible="false">
      </a-text>

      <!-- 🛒 BUY BUTTON -->
      <a-plane 
        id="buyBtn"
        position="0 -0.5 0"
        width="1.5"
        height="0.4"
        color="green"
        class="clickable">
      </a-plane>

      <a-text 
        value="BUY NOW"
        position="0 -0.5 0.1"
        align="center"
        color="white">
      </a-text>

    </a-entity>

  </a-marker>

  <!-- CAMERA + CURSOR -->
  <a-entity camera>
    <a-cursor fuse="true" fuse-timeout="800"></a-cursor>
  </a-entity>

</a-scene>

<!-- INTERACTION SCRIPT -->
<script>
  const model = document.querySelector("#model3D");
  const price = document.querySelector("#priceText");
  const buyBtn = document.querySelector("#buyBtn");

  // 🔥 Tap to Rotate
  model.addEventListener("click", () => {
    model.setAttribute("animation", {
      property: "rotation",
      to: "0 360 0",
      dur: 2000
    });
  });

  // 💰 Click → Show Price
  model.addEventListener("mouseenter", () => {
    price.setAttribute("visible", true);
  });

  model.addEventListener("mouseleave", () => {
    price.setAttribute("visible", false);
  });

  // 🛒 BUY BUTTON
  buyBtn.addEventListener("click", () => {
    alert("Redirecting to purchase page...");
    window.open("https://your-product-link.com", "_blank");
  });
</script>

</body>
</html>
